apiVersion: v1
kind: Secret
metadata:
  name: coursework-app-secrets
  namespace: coursework
type: Opaque
stringData:
  JWT_SECRET: change-me
  AUTH_MONGODB_URI: mongodb+srv://username:password@cluster.mongodb.net/authdb
  VITALS_MONGODB_URI: mongodb+srv://username:password@cluster.mongodb.net/vitalsdb
  PATIENT_MONGODB_URI: mongodb+srv://username:password@cluster.mongodb.net/patientdb
  PATIENT_ID_HASH_SALT: change-me-generated-patient-id-salt

# Note:
# - For manual Kubernetes deployments, replace the placeholder values before applying.
# - The Jenkins pipeline creates/updates this secret dynamically from Jenkins credentials.