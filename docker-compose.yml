---
services:
  gateway:
    image: ${REGISTRY}/gateway:latest
    build:
      context: .
      dockerfile: Dockerfile.gateway
    environment:
      - AUTH_SERVICE_URL=http://auth-service:3001
      - PATIENT_REG_SERVICE_URL=http://patient-service:3003
      - DIAGNOSTICS_VITALS_SERVICE_URL=http://vitals-service:3004
      - JWT_SECRET=${JWT_SECRET:-ci-zap-jwt-secret}
    ports:
      - "80:3000"
    depends_on:
      - auth-service
      - vitals-service
      - patient-service
    networks:
      - coursework-net
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/authdb
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-ci-zap-jwt-secret}
    depends_on:
      - mongodb
    networks:
      - coursework-net
    restart: unless-stopped

  vitals-service:
    build:
      context: .
      dockerfile: services/diagnostics-vitals-service/Dockerfile
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/vitalsdb
      - DIAGNOSTICS_VITALS_SERVICE_PORT=3004
      - JWT_SECRET=${JWT_SECRET:-ci-zap-jwt-secret}
    depends_on:
      - mongodb
    networks:
      - coursework-net
    restart: unless-stopped

  patient-service:
    build:
      context: .
      dockerfile: services/patient-registration-service/Dockerfile
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/patientdb
      - PATIENT_REG_SERVICE_PORT=3003
      - JWT_SECRET=${JWT_SECRET:-ci-zap-jwt-secret}
    depends_on:
      - mongodb
    networks:
      - coursework-net
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - coursework-net

networks:
  coursework-net:
    driver: bridge
