---
name: Lint

on:
  push:
  pull_request:

permissions: {}

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      issues: write
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Super-linter
        uses: super-linter/super-linter@v8.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # 1. Resolve Python Conflicts (Keep Ruff, it's the 2026 standard)
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_RUFF: true

          # 2. Resolve JavaScript/TypeScript/HTML Conflicts
          # We keep Biome enabled and disable the legacy tools it replaces
          VALIDATE_BIOME: true
          VALIDATE_JAVASCRIPT_ESLINT: false
          VALIDATE_JAVASCRIPT_PRETTIER: false
          VALIDATE_TYPESCRIPT_ESLINT: false
          VALIDATE_TYPESCRIPT_PRETTIER: false
          VALIDATE_HTML: false
          VALIDATE_JSON: false
          VALIDATE_CSS: false
