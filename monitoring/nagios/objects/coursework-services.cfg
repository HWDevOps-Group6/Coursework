define service {
    use                         generic-service
    host_name                   jenkins-vm
    service_description         VM Load
    check_command               check_load!5,4,3!10,6,4
    contact_groups              coursework-admins
}

define service {
    use                         generic-service
    host_name                   jenkins-vm
    service_description         Root Disk
    check_command               check_disk!20%!10%!/
    contact_groups              coursework-admins
}

define service {
    use                         generic-service
    host_name                   jenkins-vm
    service_description         Coursework Pods
    check_interval              2
    retry_interval              1
    check_command               check_coursework_k8s_pods!coursework!/etc/nagios4/aks-coursework.kubeconfig!/snap/bin/kubectl
    contact_groups              coursework-admins
}

define service {
