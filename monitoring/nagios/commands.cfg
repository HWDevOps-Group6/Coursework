define command {
    command_name    check_coursework_k8s_pods
    command_line    $USER1$/coursework/check_k8s_pods.sh -n '$ARG1$' -k '$ARG2$' -c '$ARG3$'
}

define command {
    command_name    check_coursework_k8s_deployment
    command_line    $USER1$/coursework/check_k8s_deployment.sh -n '$ARG1$' -d '$ARG2$' -k '$ARG3$' -c '$ARG4$'
}

define command {
    command_name    check_coursework_gateway_health
    command_line    $USER1$/coursework/check_gateway_health.sh -n '$ARG1$' -s '$ARG2$' -k '$ARG3$' -c '$ARG4$' -p '$ARG5$' -r '$ARG6$'
}
